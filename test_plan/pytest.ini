[pytest]
# ── QA 테스트 설정 ────────────────────────────────────────────────────────────
# 실행 위치: test_plan/ 폴더
# 테스트 소스: ../backend/tests/ (개발자 작성 TC 재사용)
# 결과 보고서: test_plan/results/ (QA 전용)
#
# 보고서 훅: test_plan/conftest.py 가 담당
# 개발자 conftest(backend/tests/conftest.py)에는 훅이 없으므로 충돌 없음

# ── 테스트 소스 경로 ──────────────────────────────────────────────────────────
# tests/ 디렉터리는 backend/tests/ 의 symlink 모음입니다.
# conftest.py(이 폴더)가 자연스럽게 로드됩니다.
testpaths = tests

# ── 보고서 출력 ───────────────────────────────────────────────────────────────
addopts =
    --html=results/latest.html
    --self-contained-html
    -v

# ── 경고 필터 ─────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning:pandas:
    ignore::DeprecationWarning:pandas_ta:
    ignore:datetime.datetime.utcnow:DeprecationWarning
    ignore:datetime.datetime.utcfromtimestamp:DeprecationWarning

# ── 테스트 마커 ───────────────────────────────────────────────────────────────
markers =
    unit: 단일 함수/클래스 단위 테스트
    integration: API ↔ DB 연동 테스트
    e2e: 전체 사용자 흐름 테스트
    journey: Playwright 브라우저 기반 테스트
    slow: 실행 시간이 긴 테스트
