services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://138.2.114.50:8000
    ports:
      - "5000:3000"
    depends_on:
      - backend
    restart: unless-stopped
